<!DOCTYPE html><html lang="ja">
<!-- Variant V2: stat-hero — 左側に巨大数値、右側にタイトル/説明 (16:9 1200×675) -->
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans JP',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;margin:0}
.num{font-variant-numeric:tabular-nums}
</style>
</head>
<body style="background:{{BG_GRADIENT}}">
<main class="w-[1200px] h-[675px] mx-auto px-16 py-14 relative flex flex-col justify-between overflow-hidden">

  <!-- 上部 -->
  <div class="flex items-center justify-between relative z-10">
    <span class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full"
          style="background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.45);backdrop-filter:blur(8px)">
      <span class="w-2.5 h-2.5 rounded-full bg-white"></span>
      <span style="font-size:26px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FFFFFF">{{CATEGORY_BADGE}}</span>
    </span>
    <span style="font-size:20px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgb(255,255,255)">{{YEAR_TAG}}</span>
  </div>

  <!-- 中央: 左側に巨大数値 + 右側にタイトル -->
  <div class="flex-1 grid grid-cols-[1.2fr_1.8fr] gap-12 items-center relative z-10">
    <!-- 左側: 巨大 stat -->
    <div>
      <div style="font-size:22px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgb(255,255,255);margin-bottom:8px">{{STAT_LABEL}}</div>
      <div class="num font-black text-white leading-[0.95]" style="font-size:{{STAT_FONT_SIZE}}px;letter-spacing:-0.04em;white-space:nowrap;text-shadow:0 2px 16px rgba(0,0,0,0.2)">{{STAT_VALUE_HTML}}</div>
      <div style="font-size:26px;margin-top:12px;font-weight:700;color:rgb(255,255,255);max-width:340px;line-height:1.45;text-shadow:0 1px 6px rgba(0,0,0,0.2)">{{STAT_DESC}}</div>
    </div>
    <!-- 右側: タイトル -->
    <div>
      <h1 class="font-black text-white tracking-tight" style="font-size:{{TITLE_FONT_SIZE}}px;line-height:1.18;text-shadow:0 2px 12px rgba(0,0,0,0.18)">{{TITLE}}</h1>
      {{SUBTITLE_BLOCK}}
    </div>
  </div>

  <!-- 下部: ロゴ -->
  <footer class="flex items-end justify-between relative z-10">
    <div style="font-size:20px;font-weight:700;color:rgb(255,255,255)">{{FOOTER_TEXT}}</div>
    <div class="flex items-center gap-3">
      <div class="w-[60px] h-[60px] rounded-2xl flex items-center justify-center" style="background:rgba(255,255,255,0.98)">
        <span class="font-black text-[28px]" style="color:{{LOGO_DOT_COLOR}}">S</span>
      </div>
      <div class="leading-tight">
        <div class="font-black text-[22px] text-white">ours-magazine</div>
        <div class="text-[14px] font-semibold" style="color:rgb(255,255,255)">ours-magazine.jp</div>
      </div>
    </div>
  </footer>

  <!-- デコ: 右上の点線カード (subtle) -->
  <div class="absolute -top-12 -right-12 w-[280px] h-[280px] rounded-full pointer-events-none"
       style="background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.08)"></div>
</main>
</body>
</html>
