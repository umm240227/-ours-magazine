<!DOCTYPE html><html lang="ja">
<head><meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans JP',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
</style>
</head>
<body style="background:#1C1C2E">
<main class="w-[1200px] mx-auto py-12 px-12">

  <!-- バッジ -->
  <div class="mb-10">
    <span class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full text-[20px] font-bold tracking-widest uppercase" style="background:rgba(129,140,248,0.15);color:#A5B4FC;border:1px solid rgba(129,140,248,0.4)">
      <span class="w-2.5 h-2.5 rounded-full bg-[#A5B4FC]"></span>2024 SNSインサイト
    </span>
  </div>

  <!-- ヒーロー数値 -->
  <div class="text-center py-10">
    <div class="flex items-end justify-center gap-2 leading-none mb-8">
      <span class="num font-black text-white" style="font-size:240px;line-height:0.95">73</span>
      <span class="num font-black" style="font-size:120px;line-height:1.1;color:#A5B4FC">%</span>
    </div>
    <p class="text-white font-bold mx-auto" style="font-size:40px;line-height:1.4;max-width:840px">
      購買決定の <span style="color:#A5B4FC">73%</span>が<br>SNSコンテンツに影響される
    </p>
    <p class="mt-5 text-[22px]" style="color:rgb(255,255,255)">出典: 総務省 2024 利用者調査</p>
  </div>

  <!-- 区切り線 -->
  <div class="my-10" style="border-top:1px solid rgba(255,255,255,0.15)"></div>

  <!-- 3列・小型統計 -->
  <div class="grid grid-cols-3 gap-6 mb-10">
    <div class="rounded-3xl p-8 text-center" style="background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.3)">
      <div class="num font-black leading-none mb-3 whitespace-nowrap" style="color:#34D399;font-size:72px">3.4<span style="font-size:40px">倍</span></div>
      <div class="text-[22px] font-bold" style="color:rgb(255,255,255)">リールのリーチ</div>
      <div class="text-[18px] mt-2" style="color:rgb(52,211,153)">vs 通常フィード</div>
    </div>
    <div class="rounded-3xl p-8 text-center" style="background:rgba(244,114,182,0.12);border:1px solid rgba(244,114,182,0.3)">
      <div class="num font-black leading-none mb-3 whitespace-nowrap" style="color:#F472B6;font-size:72px">65<span style="font-size:40px">%</span></div>
      <div class="text-[22px] font-bold" style="color:rgb(255,255,255)">ショート動画の視聴完了率</div>
      <div class="text-[18px] mt-2" style="color:rgb(244,114,182)">平均の完視聴率</div>
    </div>
    <div class="rounded-3xl p-8 text-center" style="background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3)">
      <div class="num font-black leading-none mb-3 whitespace-nowrap" style="color:#FBBF24;font-size:72px">520<span style="font-size:40px">%</span></div>
      <div class="text-[22px] font-bold" style="color:rgb(255,255,255)">インフルエンサーROI</div>
      <div class="text-[18px] mt-2" style="color:rgb(251,191,36)">平均の投資収益率</div>
    </div>
  </div>

  <!-- インサイトボックス -->
  <div class="rounded-3xl p-10 mb-10" style="background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.3)">
    <div class="flex gap-5 items-start">
      <span style="font-size:40px">💡</span>
      <p class="text-[22px] leading-relaxed" style="color:rgb(255,255,255)">
        消費者の10人に7人以上が、SNSを見て購入を決めています。リールやショート動画1本が、
        <strong style="color:#A5B4FC">通常の広告より3.4倍</strong>多くの顧客に届く可能性があります。
      </p>
    </div>
  </div>

  <!-- フッター -->
  <footer class="flex items-center justify-between pt-6" style="border-top:1px solid rgba(255,255,255,0.12)">
    <div class="flex items-center gap-4">
      
      <span class="font-bold text-[22px]" style="color:rgb(255,255,255)">ours-magazine.jp</span>
    </div>
    <span class="text-[20px] font-medium" style="color:rgb(255,255,255);white-space:nowrap">SNSマーケティングのセルフサービス</span>
  </footer>

</main></body></html>
