<!DOCTYPE html>
<!--
  Template: 引用カード (Quote Card)
  用途: 専門家/一次情報の引用
  Placeholders: {{QUOTE_TEXT}}, {{ATTRIBUTION}}, {{SOURCE_URL}}, {{ROLE}}
  備考: データは SAMPLE_DATA マーカー内にあります。記事ごとにデータを差し替えてください。

  レンダリング:
    node script/render-infographic.mjs this-html.html output.webp --width=1200 --max-height=2000
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans JP', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  .num { font-variant-numeric: tabular-nums; }
</style>
</head>
<body style="background:#F8FAFC">
<main class="w-[1200px] mx-auto py-16 px-12">

  <header class="mb-8">
    <div class="inline-flex items-center gap-2 bg-[#0A0A0A] text-white text-[18px] font-bold tracking-widest uppercase px-5 py-2.5 rounded-full">
      Expert Quote
    </div>
  </header>

  <!-- SAMPLE_DATA: メイン引用 -->
  <section class="bg-white rounded-[40px] p-16 mb-8 shadow-[0_4px_24px_rgba(0,0,0,0.06)] relative">
    <span class="absolute top-8 left-12 text-[160px] font-black text-[#3B70FF]  leading-none">"</span>

    <blockquote class="relative">
      <p class="text-[40px] font-bold text-[#0A0A0A] leading-[1.4] mb-10 pt-12">
        ブランドが最も見落としがちなのは、投稿の頻度ではなく <span class="text-[#3B70FF]">1本の深さ</span>です。毎日投稿する企業よりも、週2回の質の高いコンテンツを出す企業のほうが、コンバージョン率は平均3倍高い。
      </p>

      <footer class="flex items-center gap-5 pt-6 border-t border-slate-100">
        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#3B70FF] to-[#8B5CF6] flex items-center justify-center text-white font-black text-[28px]">
          佐
        </div>
        <div>
          <p class="text-[26px] font-bold text-[#0A0A0A]">佐藤 詩織 ディレクター</p>
          <p class="text-[20px] text-[#555]">DataReportal Japan · SNS広告戦略部門</p>
        </div>
      </footer>
    </blockquote>
  </section>

  <!-- SAMPLE_DATA: 補足指標 -->
  <section class="grid grid-cols-2 gap-6 mb-8">
    <div class="bg-[#E8F1FF] rounded-[24px] p-7">
      <p class="text-[20px] tracking-widest uppercase text-[#3B70FF] mb-3">根拠 1</p>
      <p class="text-[24px] font-bold text-[#0A0A0A] leading-snug">
        週2回の質の高いコンテンツを運用するアカウント320件の平均コンバージョン率は4.1%。
      </p>
    </div>
    <div class="bg-[#E8F1FF] rounded-[24px] p-7">
      <p class="text-[20px] tracking-widest uppercase text-[#3B70FF] mb-3">根拠 2</p>
      <p class="text-[24px] font-bold text-[#0A0A0A] leading-snug">
        毎日投稿するアカウントの平均コンバージョン率は1.3%で、約1/3の水準。
      </p>
    </div>
  </section>

  <footer class="flex items-center justify-between pt-6 border-t border-slate-200">
    <div class="flex items-center gap-3">
      
      <span class="font-bold text-[20px] text-slate-800">ours-magazine.jp</span>
    </div>
    <span class="text-[18px] text-slate-500">SNSマーケティングのセルフサービス</span>
  </footer>

</main>
</body>
</html>
