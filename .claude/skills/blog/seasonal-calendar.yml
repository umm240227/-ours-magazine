# snshelp 블로그 시즌·기념일 마케팅 캘린더 (정본)
#
# topic 단계(blog/topic.md) Phase 1 (b) 시즌·이벤트 캘린더에서 참조.
# 양력 고정 데이는 매년 재사용 — 갱신 불필요.
# 음력 데이(설/추석/부처님오신날)는 매년 양력 날짜 다름 → WebSearch로 그해 양력 확인.
#
# 각 데이는 (a) 양력 날짜 범위 (lookahead 14일) (b) snshelp 마케팅 각도 (c) 적합 타깃 (d) 가중치 명시.
# 적합 타깃: foodservice / retail / education / gift / general / digital
# 가중치 (1.0 = 기본, 2.0 = 시그니처 시즌): 사용자 트래픽이 폭증하는 시기일수록 높음.
#
# 사용 방법: topic 단계(blog/topic.md) Phase 1 (b)가 오늘 날짜 ± 14일 lookahead로 매칭되는 entry 추출.
# 매칭 0개일 때만 "비-시즌" 처리 (시의성 채널 a/c로 fallback).

# ─────────── 양력 고정 데이 (매년 동일) ───────────

