<!DOCTYPE html><html lang="ja">
<!--
  タイトルタイポグラフィ hero テンプレート (16:9 1200×675)
  用途: _batch-replace-hero.mjs が {{...}} placeholder を置換
-->
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans JP',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;margin:0}
.num{font-variant-numeric:tabular-nums}
</style>
</head>
<body style="background:{{BG_GRADIENT}}">
<main class="w-[1200px] h-[675px] mx-auto px-16 py-16 relative flex flex-col justify-between overflow-hidden">

  <!-- デコ: 巨大なカテゴリーイニシャル (背景にぼかし)。サブタイトル領域への干渉を避けるため右下へ移動 + サイズ縮小 -->
  <div class="absolute -bottom-32 -right-20 num font-black select-none pointer-events-none"
       style="font-size:360px;line-height:0.85;color:rgb(255,255,255);font-weight:900">
    {{DECO_LETTER}}
  </div>

  <!-- 上部: カテゴリーバッジ + 小さな識別子 -->
  <div class="flex items-center justify-between relative z-10">
    <span class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full"
          style="background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.45);backdrop-filter:blur(8px)">
      <span class="w-2.5 h-2.5 rounded-full bg-white"></span>
      <span style="font-size:26px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FFFFFF">{{CATEGORY_BADGE}}</span>
    </span>
    <span style="font-size:20px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgb(255,255,255)">
      {{YEAR_TAG}}
    </span>
  </div>

  <!-- 中央: タイトル -->
  <div class="flex-1 flex flex-col justify-center relative z-10">
    <h1 class="font-black text-white tracking-tight"
        style="font-size:{{TITLE_FONT_SIZE}}px;line-height:1.12;text-shadow:0 2px 12px rgba(0,0,0,0.18)">{{TITLE}}</h1>
    {{SUBTITLE_BLOCK}}
  </div>

  <!-- 下部: キースタッツ (ある場合のみ) + ロゴ -->
  <footer class="flex items-end justify-between relative z-10">
    {{STATS_BLOCK}}
    <div class="flex items-center gap-3">
      <div class="w-[60px] h-[60px] rounded-2xl flex items-center justify-center"
           style="background:rgba(255,255,255,0.98)">
        <span class="font-black text-[28px]" style="color:{{LOGO_DOT_COLOR}}">S</span>
      </div>
      <div class="leading-tight">
        <div class="font-black text-[22px] text-white">ours-magazine</div>
        <div class="text-[14px] font-semibold" style="color:rgb(255,255,255)">ours-magazine.jp</div>
      </div>
    </div>
  </footer>
</main>
</body>
</html>
