<!doctype html>
<html lang="ja">
<!--
  Variant V5: checklist-hero — Do/Don't チェックリスト hero (16:9 1200×675)
  用途: _batch-replace-hero.mjs が {{...}} placeholder を置換
  PLACEHOLDER: {{TITLE}} {{DO_ITEMS}}(3-5個の配列) {{DONT_ITEMS}}(3-5個の配列) {{CATEGORY}} {{YEAR_TAG}}
  §4.8.5 必須仕様: タイトル ≥ 56px / Do・Don't 項目 ≥ 36px / カテゴリーバッジ ≥ 24px / ロゴ ≥ 60×60

  DO_ITEMS / DONT_ITEMS 置換例 (配列 → <li>):
    <li class="flex items-start gap-3"><span class="text-[34px] leading-none">✓</span><span>安全なブースト速度</span></li>
-->
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans JP',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;margin:0}
</style>
</head>
<body style="background:#0B1220">
<main class="w-[1200px] h-[675px] relative overflow-hidden px-12 py-10 flex flex-col">

  <!-- 上部: カテゴリーバッジ + 年 -->
  <div class="flex items-center justify-between relative z-10">
    <!-- PLACEHOLDER: {{CATEGORY}} -->
    <span class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full"
          style="background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.45);backdrop-filter:blur(8px)">
      <span class="w-2.5 h-2.5 rounded-full bg-white"></span>
      <span style="font-size:26px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FFFFFF">{{CATEGORY}}</span>
    </span>
    <!-- PLACEHOLDER: {{YEAR_TAG}} -->
    <span style="font-size:20px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgb(255,255,255)">{{YEAR_TAG}}</span>
  </div>

  <!-- タイトル -->
  <div class="mt-6 relative z-10">
    <!-- PLACEHOLDER: {{TITLE}} -->
    <h1 class="font-black text-white tracking-tight"
        style="font-size:56px;line-height:1.12;text-shadow:0 2px 12px rgba(0,0,0,0.18);max-width:1080px">{{TITLE}}</h1>
  </div>

  <!-- 中央: Do / Don't 2カラムカード -->
  <div class="flex-1 grid grid-cols-2 gap-6 mt-6 relative z-10">
    <!-- DO カード -->
    <div class="rounded-2xl p-6 flex flex-col"
         style="background:rgba(34,197,94,0.18);border:2px solid rgba(34,197,94,0.55)">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-11 h-11 rounded-full flex items-center justify-center"
             style="background:rgba(34,197,94,0.95)">
          <span class="font-black text-[24px] text-white">✓</span>
        </div>
        <span class="font-black text-[28px] text-white" style="text-shadow:0 1px 6px rgba(0,0,0,0.3)">DO</span>
      </div>
      <!-- PLACEHOLDER: {{DO_ITEMS}} (3-5個の <li> 配列) -->
      <ul class="space-y-3 font-bold text-white" style="font-size:36px;line-height:1.32;text-shadow:0 1px 6px rgba(0,0,0,0.3)">
        {{DO_ITEMS}}
      </ul>
    </div>

    <!-- DON'T カード -->
    <div class="rounded-2xl p-6 flex flex-col"
         style="background:rgba(239,68,68,0.18);border:2px solid rgba(239,68,68,0.55)">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-11 h-11 rounded-full flex items-center justify-center"
             style="background:rgba(239,68,68,0.95)">
          <span class="font-black text-[24px] text-white">✕</span>
        </div>
        <span class="font-black text-[28px] text-white" style="text-shadow:0 1px 6px rgba(0,0,0,0.3)">DON'T</span>
      </div>
      <!-- PLACEHOLDER: {{DONT_ITEMS}} (3-5個の <li> 配列) -->
      <ul class="space-y-3 font-bold text-white" style="font-size:36px;line-height:1.32;text-shadow:0 1px 6px rgba(0,0,0,0.3)">
        {{DONT_ITEMS}}
      </ul>
    </div>
  </div>

  <!-- 下部: ロゴ -->
  <footer class="absolute bottom-5 left-12 right-12 flex items-center justify-between z-10">
    <div class="flex items-center gap-3">

      <span class="font-black text-[22px] text-white">ours-magazine.jp</span>
    </div>
    <span class="font-semibold text-[14px] text-white">SNSマーケティング セルフサービス</span>
  </footer>
</main>
</body>
</html>
