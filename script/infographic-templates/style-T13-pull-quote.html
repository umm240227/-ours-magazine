<!DOCTYPE html><html lang="ja">
<head><meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans JP',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
</style>
</head>
<body style="background:#FFF1F2">
<main class="w-[1200px] mx-auto py-12 px-12">

  <!-- バッジ -->
  <div class="text-center mb-10">
    <span class="inline-flex items-center gap-2 px-6 py-3 rounded-full text-[20px] font-bold tracking-widest uppercase" style="background:#FFE4E6;color:#9F1239;border:2px solid #FECDD3">
      💬 REAL STORY
    </span>
  </div>

  <!-- 引用セクション -->
  <div class="rounded-[32px] p-14 mb-10 relative overflow-hidden" style="background:#FFF1F2;border:3px solid #FECDD3">
    <!-- 装飾の引用符 -->
    <div class="absolute top-4 left-8 font-black leading-none select-none" style="font-size:240px;color:#FECDD3;line-height:1;font-family:Georgia,serif">"</div>
    <!-- 引用テキスト -->
    <div class="relative z-10 pt-24 mb-8">
      <p class="font-black leading-snug text-gray-900" style="font-size:52px">
        フォロワー3万人で<br>月商 <span style="color:#E11D48">150万円</span>。<br>SNSひとつで、店舗<br>なしでも成り立つ。
      </p>
    </div>
    <!-- 出典 -->
    <div class="flex items-center gap-5 pt-6" style="border-top:2px solid #FECDD3">
      <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background:#FFE4E6;font-size:32px">👩‍💼</div>
      <div>
        <div class="font-bold text-[24px] text-gray-900">佐藤○○さん</div>
        <div class="text-[20px] font-semibold" style="color:#9F1239">Instagram ハンドメイドブランド運営者</div>
      </div>
    </div>
  </div>

  <!-- 横並びスタッツ3つ -->
  <div class="grid grid-cols-3 gap-6 mb-10">
    <div class="bg-white rounded-3xl p-8 text-center shadow-sm" style="border:2px solid #FFE4E6">
      <div class="mb-3" style="font-size:44px">📈</div>
      <div class="num font-black leading-none mb-3 whitespace-nowrap" style="color:#E11D48;font-size:56px">150<span style="font-size:30px">万円</span></div>
      <div class="text-[22px] font-bold" style="color:#475569">月商</div>
      <div class="text-[18px] font-bold mt-2" style="color:#9F1239">SNS専用チャネル</div>
    </div>
    <div class="bg-white rounded-3xl p-8 text-center shadow-sm" style="border:2px solid #FFE4E6">
      <div class="mb-3" style="font-size:44px">👥</div>
      <div class="num font-black leading-none mb-3 whitespace-nowrap" style="color:#E11D48;font-size:56px">3万<span style="font-size:30px">人</span></div>
      <div class="text-[22px] font-bold" style="color:#475569">フォロワー転換率</div>
      <div class="num text-[18px] font-bold mt-2" style="color:#9F1239">購入転換 5%</div>
    </div>
    <div class="bg-white rounded-3xl p-8 text-center shadow-sm" style="border:2px solid #FFE4E6">
      <div class="mb-3" style="font-size:44px">⏰</div>
      <div class="num font-black leading-none mb-3 whitespace-nowrap" style="color:#E11D48;font-size:56px">8<span style="font-size:30px">か月</span></div>
      <div class="text-[22px] font-bold" style="color:#475569">運営期間</div>
      <div class="text-[18px] font-bold mt-2" style="color:#9F1239">店舗コスト0円</div>
    </div>
  </div>

  <!-- インサイトボックス -->
  <div class="rounded-3xl p-10 mb-10" style="background:#FFE4E6;border:2px solid #FECDD3">
    <div class="flex gap-5 items-start">
      <span style="font-size:40px">💡</span>
      <p class="text-[22px] leading-relaxed" style="color:#881337">
        SNSフォロワー1万人あたりの平均リーチは<strong>2,600人</strong>ですが、リール・ハッシュタグ最適化で
        <strong>+12.6%</strong>のリーチ上乗せが見込めます。まずはコンテンツ戦略から始めましょう。
      </p>
    </div>
  </div>

  <!-- フッター -->
  <footer class="flex items-center justify-between pt-4">
    <div class="flex items-center gap-4">
      
      <span class="font-bold text-[22px] text-gray-800">ours-magazine.jp</span>
    </div>
    <span class="text-[20px] font-medium text-gray-700" style="white-space:nowrap">SNSマーケティング セルフサービス</span>
  </footer>

</main></body></html>
