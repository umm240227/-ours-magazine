<!doctype html>
<html lang="ja">
<!--
  Variant V4: quote-hero — 一次ソースの引用文を強調する hero (16:9 1200×675)
  用途: _batch-replace-hero.mjs が {{...}} placeholder を置換
  PLACEHOLDER: {{TITLE}} {{QUOTE_TEXT}} {{QUOTE_SOURCE}} {{CATEGORY}} {{YEAR_TAG}}
  §4.8.5 必須仕様: タイトル ≥ 56px / blockquote 本文 ≥ 48px / カテゴリーバッジ ≥ 24px / ロゴ ≥ 60×60
-->
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans JP',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;margin:0}
.num{font-variant-numeric:tabular-nums}
</style>
</head>
<body style="background:#0B1220">
<main class="w-[1200px] h-[675px] relative overflow-hidden px-12 py-12 flex flex-col justify-between">

  <!-- 巨大な引用符デコ (背景) -->
  <div class="absolute select-none pointer-events-none font-black"
       style="top:40px;left:40px;font-size:380px;line-height:0.85;color:rgb(255,255,255)">"</div>

  <!-- 上部: カテゴリーバッジ + 年 -->
  <div class="flex items-center justify-between relative z-10">
    <!-- PLACEHOLDER: {{CATEGORY}} -->
    <span class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full"
          style="background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.45);backdrop-filter:blur(8px)">
      <span class="w-2.5 h-2.5 rounded-full bg-white"></span>
      <span style="font-size:26px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FFFFFF">{{CATEGORY}}</span>
    </span>
    <!-- PLACEHOLDER: {{YEAR_TAG}} -->
    <span style="font-size:20px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgb(255,255,255)">{{YEAR_TAG}}</span>
  </div>

  <!-- 中央: タイトル + 引用 -->
  <div class="flex-1 flex flex-col justify-center relative z-10 mt-2">
    <!-- PLACEHOLDER: {{TITLE}} -->
    <h1 class="font-black text-white tracking-tight"
        style="font-size:60px;line-height:1.12;text-shadow:0 2px 12px rgba(0,0,0,0.18);max-width:1080px">{{TITLE}}</h1>

    <!-- PLACEHOLDER: {{QUOTE_TEXT}} -->
    <blockquote class="relative mt-8 pl-8"
         style="border-left:6px solid rgba(255,255,255,0.55)">
      <p class="font-bold text-white"
         style="font-size:48px;line-height:1.32;letter-spacing:-0.01em;text-shadow:0 2px 8px rgba(0,0,0,0.3);max-width:1020px">{{QUOTE_TEXT}}</p>
      <!-- PLACEHOLDER: {{QUOTE_SOURCE}} -->
      <cite class="block not-italic mt-5"
            style="font-size:22px;font-weight:700;color:rgb(255,255,255);letter-spacing:0.02em">— {{QUOTE_SOURCE}}</cite>
    </blockquote>
  </div>

  <!-- 下部: ロゴ -->
  <footer class="absolute bottom-6 left-12 right-12 flex items-center justify-between z-10">
    <div class="flex items-center gap-3">
      
      <div class="leading-tight">
        <div class="font-black text-[22px] text-white">ours-magazine.jp</div>
        <div class="text-[14px] font-semibold" style="color:rgb(255,255,255)">SNSマーケティング セルフサービス</div>
      </div>
    </div>
    <span class="font-semibold text-[18px]" style="color:rgb(255,255,255)">ours-magazine インサイト</span>
  </footer>
</main>
</body>
</html>
